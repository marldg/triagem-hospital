# Configuracao do banco H2 (em memoria)
spring.datasource.url=jdbc:h2:mem:hospitaldb
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# Faz o Hibernate criar/atualizar as tabelas automaticamente com base nas entidades
spring.jpa.hibernate.ddl-auto=update

# Mostra os comandos SQL no console (util para aprender e debugar)
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# Habilita o painel visual do H2 (acessivel pelo navegador)
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console